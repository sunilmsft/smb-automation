<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunil's Project Hub</title>
    <script>
      (() => {
        const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
        const theme =
          param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
        :root {
          color-scheme: light;
          --cp-bg: #f7f4ef;
          --cp-bg-elevated: #fcfbf8;
          --cp-surface: #ffffff;
          --cp-surface-soft: #f5f5f5;
          --cp-border: #dedede;
          --cp-border-strong: #919191;
          --cp-text: #242424;
          --cp-text-muted: #5c5c5c;
          --cp-text-soft: #6f6f6f;
          --cp-accent: #b11f4b;
          --cp-accent-hover: #9a1a41;
          --cp-accent-soft: rgba(177, 31, 75, 0.08);
          --cp-accent-fg: #ffffff;
          --cp-success: #16a34a;
          --cp-danger: #dc2626;
          --cp-warning: #f59e0b;
          --cp-link: #0078d4;
          --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
          --cp-overlay: rgba(255, 255, 255, 0.8);
          --cp-panel: rgba(255, 255, 255, 0.86);
          --cp-panel-strong: rgba(255, 255, 255, 0.96);
          --cp-sheen: rgba(255, 255, 255, 0.55);
          --cp-highlight: rgba(177, 31, 75, 0.12);
        }
        html[data-theme="dark"] {
          color-scheme: dark;
          --cp-bg: #3d3b3a;
          --cp-bg-elevated: #343231;
          --cp-surface: #292929;
          --cp-surface-soft: #2e2e2e;
          --cp-border: #474747;
          --cp-border-strong: #5f5f5f;
          --cp-text: #dedede;
          --cp-text-muted: #919191;
          --cp-text-soft: #b0b0b0;
          --cp-accent: #fd8ea1;
          --cp-accent-hover: #fb7b91;
          --cp-accent-soft: rgba(253, 142, 161, 0.14);
          --cp-accent-fg: #1a1a1a;
          --cp-success: #4ade80;
          --cp-danger: #f87171;
          --cp-warning: #fbbf24;
          --cp-link: #4da6ff;
          --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
          --cp-overlay: rgba(41, 41, 41, 0.88);
          --cp-panel: rgba(41, 41, 41, 0.72);
          --cp-panel-strong: rgba(41, 41, 41, 0.96);
          --cp-sheen: rgba(255, 255, 255, 0.04);
          --cp-highlight: rgba(253, 142, 161, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cp-bg);
            color: var(--cp-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: var(--cp-surface);
            border-bottom: 1px solid var(--cp-border);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-meta {
            font-size: 0.82rem;
            color: var(--cp-text-muted);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .theme-toggle {
            background: var(--cp-surface-soft);
            border: 1px solid var(--cp-border);
            border-radius: 0.625rem;
            padding: 0.35rem 0.7rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--cp-text-muted);
        }
        .theme-toggle:hover { border-color: var(--cp-border-strong); }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            padding: 1rem 2rem;
            background: var(--cp-bg-elevated);
            border-bottom: 1px solid var(--cp-border);
        }
        .stat {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
        }
        .stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--cp-accent);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--cp-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        .project-card {
            background: var(--cp-surface);
            border-radius: 16px;
            border: 1px solid var(--cp-border);
            overflow: hidden;
            box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
            transition: border-color 0.2s;
        }
        .project-card:hover { border-color: var(--cp-border-strong); }

        .card-top {
            display: flex;
            align-items: stretch;
        }

        .card-status-strip {
            width: 5px;
            flex-shrink: 0;
        }
        .status-live { background: var(--cp-success); }
        .status-mvp { background: var(--cp-warning); }
        .status-building { background: var(--cp-accent); }

        .card-main {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
        }
        .card-title-area { display: flex; flex-direction: column; gap: 0.25rem; }
        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-subtitle {
            font-size: 0.85rem;
            color: var(--cp-text-muted);
        }
        .status-badge {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.25rem 0.65rem;
            border-radius: 999px;
            white-space: nowrap;
        }
        .badge-live { background: rgba(22,163,74,0.12); color: var(--cp-success); }
        .badge-mvp { background: rgba(245,158,11,0.12); color: var(--cp-warning); }
        .badge-building { background: var(--cp-accent-soft); color: var(--cp-accent); }

        .card-desc {
            font-size: 0.92rem;
            color: var(--cp-text-soft);
            line-height: 1.6;
        }

        .card-built {
            background: var(--cp-surface-soft);
            border-radius: 0.625rem;
            padding: 0.75rem 1rem;
        }
        .card-built-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--cp-text-muted);
            margin-bottom: 0.4rem;
        }
        .card-built ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .card-built li {
            font-size: 0.82rem;
            color: var(--cp-text);
            background: var(--cp-surface);
            border: 1px solid var(--cp-border);
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
        }

        .card-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .tech-pill {
            font-size: 0.72rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            background: var(--cp-highlight);
            color: var(--cp-accent);
            font-family: Consolas, "Courier New", Courier, monospace;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding-top: 0.25rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 0.625rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--cp-accent);
            color: var(--cp-accent-fg);
        }
        .btn-primary:hover { background: var(--cp-accent-hover); }
        .btn-secondary {
            background: var(--cp-surface-soft);
            color: var(--cp-text);
            border: 1px solid var(--cp-border);
        }
        .btn-secondary:hover { border-color: var(--cp-border-strong); }
        .btn-link {
            background: none;
            color: var(--cp-link);
            padding: 0.5rem 0.5rem;
        }
        .btn-link:hover { text-decoration: underline; }

        .btn-icon {
            width: 16px;
            height: 16px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--cp-text-muted);
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        .pricing-note {
            font-size: 0.82rem;
            color: var(--cp-text-muted);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        /* Compact repo grid */
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }
        .repo-card {
            background: var(--cp-surface);
            border-radius: 12px;
            border: 1px solid var(--cp-border);
            padding: 1.25rem;
            box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: border-color 0.2s;
        }
        .repo-card:hover { border-color: var(--cp-border-strong); }
        .repo-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .repo-desc {
            font-size: 0.85rem;
            color: var(--cp-text-soft);
            line-height: 1.5;
            flex: 1;
        }
        .repo-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .lang-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .lang-label {
            font-size: 0.78rem;
            color: var(--cp-text-muted);
        }
        .private-badge {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            border: 1px solid var(--cp-border);
            color: var(--cp-text-muted);
        }
        .updated-label {
            font-size: 0.75rem;
            color: var(--cp-text-muted);
            margin-left: auto;
        }
        .repo-links {
            display: flex;
            gap: 0.5rem;
            padding-top: 0.25rem;
        }
        .repo-links a {
            font-size: 0.82rem;
        }

        .section-divider {
            border: none;
            border-top: 1px solid var(--cp-border);
            margin: 2rem 0 0.5rem;
        }

        .account-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }
        .account-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--cp-surface-soft);
            border: 1px solid var(--cp-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }
        .account-name {
            font-size: 0.95rem;
            font-weight: 600;
        }
        .account-count {
            font-size: 0.78rem;
            color: var(--cp-text-muted);
            background: var(--cp-surface-soft);
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
        }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            font-size: 0.8rem;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            border: 1px solid var(--cp-border);
            background: var(--cp-surface);
            color: var(--cp-text-muted);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--cp-border-strong); }
        .filter-btn.active {
            background: var(--cp-accent);
            color: var(--cp-accent-fg);
            border-color: var(--cp-accent);
        }

        .search-box {
            padding: 0.5rem 0.85rem;
            border: 1px solid var(--cp-border);
            border-radius: 0.625rem;
            background: var(--cp-surface);
            color: var(--cp-text);
            font-size: 0.85rem;
            font-family: inherit;
            width: 100%;
            max-width: 320px;
            outline: none;
            margin-bottom: 1rem;
        }
        .search-box:focus { border-color: var(--cp-accent); }

        @media (max-width: 640px) {
            .header { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
            .stats-bar { flex-wrap: wrap; }
            .content { padding: 1rem; }
            .card-header { flex-direction: column; }
            .repo-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    // ── Render ──────────────────────────────────────────────────────────

    function renderStats() {
        const liveCount = REPOS.filter(r => r.live).length;
        const privCount = REPOS.filter(r => r.priv).length;
        const langs = [...new Set(REPOS.map(r => r.lang).filter(Boolean))];

            <div class="stat"><span class="stat-num">${REPOS.length - privCount}</span><span class="stat-label">Public</span></div>

            <div class="stat"><span class="stat-num">${langs.length}</span><span class="stat-label">Languages</span></div>

        bar.innerHTML = `
            <button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
            <button class="filter-btn ${activeFilter === 'live' ? 'active' : ''}" onclick="setFilter('live')">Live</button>
            <button class="filter-btn ${activeFilter === 'private' ? 'active' : ''}" onclick="setFilter('private')">Private</button>
            ${langs.map(l => `<button class="filter-btn ${activeFilter === l ? 'active' : ''}" onclick="setFilter('${l}')">${l}</button>`).join('')}
        `;
    }

    function setFilter(f) {
        activeFilter = f;
        renderFilters();
        renderRepos();
    }

    function renderFeatured() {
        const grid = document.getElementById('featured-grid');
        grid.innerHTML = FEATURED.map(p => `
            <div class="project-card">
                <div class="card-top">
                    <div class="card-status-strip status-${p.status}"></div>
                    <div class="card-main">
                        <div class="card-header">
                            <div class="card-title-area">
                                <div class="card-title">${p.icon} ${esc(p.name)}</div>
                                <div class="card-subtitle">${esc(p.subtitle)}</div>
                            </div>
                            <span class="status-badge badge-${p.status}">${p.statusLabel}</span>
                        </div>
                        <div class="card-desc">${esc(p.description)}</div>
                        <div class="card-built">
                            <div class="card-built-title">What's Built</div>
                            <ul>${p.built.map(b => `<li>${esc(b)}</li>`).join('')}</ul>
                        </div>
                        <div class="card-tech">
                            ${p.tech.map(t => `<span class="tech-pill">${esc(t)}</span>`).join('')}
                        </div>
                        <div class="pricing-note">
                            ${p.pricing !== "Internal tool" ? "💰" : "🔒"} ${esc(p.pricing)}
                        </div>
                        <div class="card-actions">
                            <a href="vscode://file/${encodeURI(p.localPath.replace(/\\\\/g, '/'))}"
                               class="btn btn-primary">Open in VS Code</a>
                            <a href="${p.repoUrl}" target="_blank" class="btn btn-secondary">GitHub Repo</a>
                            ${p.liveUrl
                                ? `<a href="${p.liveUrl}" target="_blank" class="btn btn-link">Live Site →</a>`
                                : ''}
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderRepos() {
        const query = document.getElementById('search').value.toLowerCase();
        let filtered = REPOS;

        if (query) {
            filtered = filtered.filter(r =>
                r.name.toLowerCase().includes(query) ||
                r.desc.toLowerCase().includes(query) ||
                (r.lang && r.lang.toLowerCase().includes(query))
            );
        }

        if (activeFilter === 'live') filtered = filtered.filter(r => r.live);
        else if (activeFilter === 'private') filtered = filtered.filter(r => r.priv);
        else if (activeFilter !== 'all') filtered = filtered.filter(r => r.lang === activeFilter);

        const grid = document.getElementById('repo-grid');
        grid.innerHTML = filtered.map(r => `
            <div class="repo-card">
                <div class="repo-name">
                    ${esc(r.name)}
                    ${r.priv ? '<span class="private-badge">Private</span>' : ''}
                </div>
                <div class="repo-desc">${esc(r.desc)}</div>
                <div class="repo-meta">
                    ${r.lang ? `<span class="lang-dot" style="background:${LANG_COLORS[r.lang] || 'var(--cp-text-muted)'}"></span><span class="lang-label">${r.lang}</span>` : ''}
                    <span class="updated-label">Updated ${formatDate(r.updated)}</span>
                </div>
                <div class="repo-links">
                    ${r.localPath
                        ? `<a href="vscode://file/${encodeURI(r.localPath.replace(/\\\\/g, '/'))}" class="btn btn-primary" style="padding:0.35rem 0.75rem;font-size:0.8rem;">VS Code</a>`
                        : ''}
                    <a href="${r.url}" target="_blank" class="btn btn-secondary" style="padding:0.35rem 0.75rem;font-size:0.8rem;">Repo</a>
                    ${r.live
                        ? `<a href="${r.live}" target="_blank" class="btn btn-link" style="font-size:0.8rem;">Live →</a>`
                        : ''}
                </div>
            </div>
        `).join('');

        if (filtered.length === 0) {
            grid.innerHTML = '<div style="color:var(--cp-text-muted);font-size:0.9rem;padding:2rem;text-align:center;">No repos match your search.</div>';
        }
    }

    function formatDate(d) {
        const date = new Date(d);
        const now = new Date();
        const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
        if (diffDays === 0) return 'today';
        if (diffDays === 1) return 'yesterday';
        if (diffDays < 7) return `${diffDays}d ago`;
        if (diffDays < 30) return `${Math.floor(diffDays / 7)}w ago`;
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function esc(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    renderStats();
    renderFeatured();
    renderFilters();
    renderRepos();
    </script>
</body>
</html>
