          --cp-text: #242424;
          --cp-text-muted: #5c5c5c;
          --cp-text-soft: #6f6f6f;
          --cp-accent: #b11f4b;
          --cp-accent-hover: #9a1a41;
          --cp-accent-soft: rgba(177, 31, 75, 0.08);
          --cp-accent-fg: #ffffff;
          --cp-success: #16a34a;
          --cp-danger: #dc2626;
          --cp-warning: #f59e0b;
          --cp-link: #0078d4;
          --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
          --cp-overlay: rgba(255, 255, 255, 0.8);
          --cp-panel: rgba(255, 255, 255, 0.86);
          --cp-panel-strong: rgba(255, 255, 255, 0.96);
          --cp-sheen: rgba(255, 255, 255, 0.55);
          --cp-highlight: rgba(177, 31, 75, 0.12);
        }
        html[data-theme="dark"] {
          color-scheme: dark;
          --cp-bg: #3d3b3a;
          --cp-bg-elevated: #343231;
          --cp-surface: #292929;
          --cp-surface-soft: #2e2e2e;
          --cp-border: #474747;
          --cp-border-strong: #5f5f5f;
          --cp-text: #dedede;
          --cp-text-muted: #919191;
          --cp-text-soft: #b0b0b0;
          --cp-accent: #fd8ea1;
          --cp-accent-hover: #fb7b91;
          --cp-accent-soft: rgba(253, 142, 161, 0.14);
          --cp-accent-fg: #1a1a1a;
          --cp-success: #4ade80;
          --cp-danger: #f87171;
          --cp-warning: #fbbf24;
          --cp-link: #4da6ff;
          --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
          --cp-overlay: rgba(41, 41, 41, 0.88);
          --cp-panel: rgba(41, 41, 41, 0.72);
          --cp-panel-strong: rgba(41, 41, 41, 0.96);
          --cp-sheen: rgba(255, 255, 255, 0.04);
          --cp-highlight: rgba(253, 142, 161, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cp-bg); color: var(--cp-text);
            line-height: 1.6; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ── Top Bar ─────────────────────────────────── */
        .topbar {
            background: var(--cp-surface); border-bottom: 1px solid var(--cp-border);
            padding: 0.55rem 1.25rem; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0; z-index: 200;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar h1 { font-size: 1.05rem; font-weight: 700; }
        .topbar-stats { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--cp-text-muted); }
        .topbar-stats .val { font-weight: 700; color: var(--cp-accent); }
        .topbar-btn {
            background: var(--cp-surface-soft); border: 1px solid var(--cp-border);
            border-radius: 0.625rem; padding: 0.25rem 0.6rem; cursor: pointer;
            font-size: 0.78rem; color: var(--cp-text-muted); font-family: inherit;
        }
        .topbar-btn:hover { border-color: var(--cp-border-strong); }

        /* ── Layout ──────────────────────────────────── */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* ── Sidebar ─────────────────────────────────── */
        .sidebar {
            width: 220px; flex-shrink: 0; background: var(--cp-bg-elevated);
            border-right: 1px solid var(--cp-border);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar-section { padding: 0.6rem 0.4rem 0.2rem; }
        .sidebar-label {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--cp-text-muted); padding: 0 0.5rem;
            margin-bottom: 0.25rem;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 0.45rem;
            padding: 0.35rem 0.55rem; border-radius: 0.625rem;
            cursor: pointer; font-size: 0.82rem; color: var(--cp-text-soft);
            transition: all 0.12s;
        }
        .sidebar-item:hover { background: var(--cp-surface); color: var(--cp-text); }
        .sidebar-item.active {
            background: var(--cp-accent-soft); color: var(--cp-accent); font-weight: 600;
        }
        .sidebar-icon { font-size: 0.95rem; width: 20px; text-align: center; flex-shrink: 0; }
        .sidebar-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-badge {
            font-size: 0.62rem; background: var(--cp-surface-soft); border: 1px solid var(--cp-border);
            border-radius: 999px; padding: 0.05rem 0.35rem; color: var(--cp-text-muted);
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .dot-live { background: var(--cp-success); }
        .dot-building { background: var(--cp-warning); }
        .dot-complete { background: var(--cp-success); }
        .dot-reference { background: var(--cp-border); }

        /* ── Main ────────────────────────────────────── */
        .main { flex: 1; overflow-y: auto; padding: 1.25rem 1.75rem; }

        /* ── Dashboard Cards ─────────────────────────── */
        .section-label {
            font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--cp-text-muted);
            margin: 1.25rem 0 0.5rem; padding-bottom: 0.25rem;
            border-bottom: 1px solid var(--cp-border);
        }
        .section-label:first-child { margin-top: 0; }
        .dash-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 0.85rem; margin-bottom: 0.5rem;
        }
        .dash-card {
            background: var(--cp-surface); border: 1px solid var(--cp-border);
            border-radius: 12px; padding: 1rem;
            box-shadow: 0 0 2px rgba(0,0,0,0.08); cursor: pointer;
            transition: border-color 0.15s;
        }
        .dash-card:hover { border-color: var(--cp-border-strong); }
        .dash-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
        .dash-card-icon { font-size: 1.2rem; }
        .dash-card h3 { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.2rem; }
        .dash-card p { font-size: 0.78rem; color: var(--cp-text-soft); line-height: 1.45; }
        .dash-card-tech { display: flex; gap: 0.2rem; margin-top: 0.55rem; flex-wrap: wrap; }
        .tech-pill {
            font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px;
            background: var(--cp-highlight); color: var(--cp-accent);
            font-family: Consolas, "Courier New", monospace;
        }
        .pill {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.3px; padding: 0.15rem 0.5rem; border-radius: 999px;
        }
        .pill-live { background: rgba(22,163,74,0.12); color: var(--cp-success); }
        .pill-building { background: rgba(245,158,11,0.12); color: var(--cp-warning); }
        .pill-complete { background: var(--cp-accent-soft); color: var(--cp-accent); }
        .pill-reference { background: var(--cp-surface-soft); color: var(--cp-text-muted); }

        /* ── Detail View ─────────────────────────────── */
        .detail-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap; }
        .detail-title { display: flex; align-items: center; gap: 0.5rem; }
        .detail-title h2 { font-size: 1.4rem; font-weight: 700; }
        .detail-title .icon { font-size: 1.6rem; }
        .detail-sub { font-size: 0.85rem; color: var(--cp-text-muted); margin-top: 0.1rem; }
        .detail-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.4rem 0.8rem; border-radius: 0.625rem;
            font-size: 0.8rem; font-weight: 600; text-decoration: none;
            cursor: pointer; border: none; transition: all 0.15s; font-family: inherit;
        }
        .btn-primary { background: var(--cp-accent); color: var(--cp-accent-fg); }
        .btn-primary:hover { background: var(--cp-accent-hover); }
        .btn-secondary { background: var(--cp-surface-soft); color: var(--cp-text); border: 1px solid var(--cp-border); }
        .btn-secondary:hover { border-color: var(--cp-border-strong); }
        .btn-link { background: none; color: var(--cp-link); }
        .btn-link:hover { text-decoration: underline; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.85rem; margin-bottom: 1rem; }
        .info-box { background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 12px; padding: 1rem 1.1rem; }
        .info-box-label {
            font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--cp-text-muted); margin-bottom: 0.4rem;

        .info-box li { font-size: 0.82rem; padding: 0.15rem 0; display: flex; align-items: baseline; gap: 0.3rem; }
        .info-box li::before { content: '›'; color: var(--cp-accent); font-weight: bold; }
        .env-tag {
            font-family: Consolas, "Courier New", monospace; font-size: 0.75rem;
            background: var(--cp-surface-soft); padding: 0.08rem 0.3rem; border-radius: 4px;

        .sub-stat {
            background: var(--cp-surface); border: 1px solid var(--cp-border);
            border-radius: 12px; padding: 0.85rem 1rem; text-align: center;
        }
        .sub-stat .label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--cp-text-muted); margin-bottom: 0.15rem; }
        .sub-stat .val { font-size: 1.4rem; font-weight: 700; }
        .sub-tbl { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .sub-tbl th {
            text-align: left; font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--cp-text-muted); padding: 0.5rem 0.65rem;
            border-bottom: 2px solid var(--cp-border);
        }
        .sub-tbl td { padding: 0.55rem 0.65rem; border-bottom: 1px solid var(--cp-border); }
        .sub-tbl tr:hover td { background: var(--cp-surface-soft); }
        .sub-badge { font-size: 0.65rem; font-weight: 600; padding: 0.12rem 0.45rem; border-radius: 999px; }
        .sb-active { background: rgba(22,163,74,0.12); color: var(--cp-success); }
        .sb-free { background: var(--cp-surface-soft); color: var(--cp-text-muted); }
        .sb-trial { background: rgba(245,158,11,0.12); color: var(--cp-warning); }

        .review-box {
            margin-top: 1rem; padding: 0.85rem 1rem; background: var(--cp-surface);
            border: 1px solid var(--cp-warning); border-radius: 12px;
        }
        .review-box h4 { font-size: 0.85rem; color: var(--cp-warning); margin-bottom: 0.35rem; }
        .review-box li { font-size: 0.82rem; padding: 0.2rem 0; list-style: none; }

        .view-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.15rem; }
        .view-sub { font-size: 0.82rem; color: var(--cp-text-muted); margin-bottom: 1rem; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { padding: 0.75rem; }
            .topbar-stats { display: none; }
        }
    </style>
</head>

  { name:'Supabase', project:'Kolo', cost:0, cycle:'monthly', status:'free', note:'Free tier — auth + Postgres DB' },
  { name:'Vercel', project:'Tuck', cost:0, cycle:'monthly', status:'free', note:'Hobby plan — frontend hosting' },
  { name:'Vercel', project:'sunilvenugopal.com', cost:0, cycle:'monthly', status:'free', note:'Personal site hosting' },
  { name:'Namecheap', project:'Tuck', cost:1.18, cycle:'yearly', status:'active', note:'Domain: tuckapp.site — expires Apr 2027, auto-renew OFF (renewal price may differ)' },
  { name:'Cloudflare', project:'Tuck', cost:0, cycle:'monthly', status:'free', note:'DNS routing' },
  { name:'Cloudflare', project:'sunilvenugopal.com', cost:10.46, cycle:'yearly', status:'active', note:'Domain: sunilvenugopal.com — renews May 2027, auto-renew on' },
  { name:'GitHub Pages', project:'SMB Dashboard', cost:0, cycle:'monthly', status:'free', note:'Static hosting' },
  { name:'GitHub Actions', project:'Lunch Notifier', cost:0, cycle:'monthly', status:'free', note:'Cron workflow — weekdays 7 AM' },
  { name:'Pushover', project:'Lunch Notifier', cost:5, cycle:'one-time', status:'active', note:'$5 one-time (or 30-day trial)' },
];

// ═══════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════
let view = 'dashboard';

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function dotCls(s) { return 'dot dot-' + s; }
function pillCls(s) { return 'pill pill-' + s; }
function moTotal() {
    let t = 0;
    SUBS.forEach(s => {
        if ((s.status === 'active' || s.status === 'trial') && s.cycle === 'monthly') t += s.cost;
        if ((s.status === 'active' || s.status === 'trial') && s.cycle === 'yearly') t += s.cost / 12;
    });
    return Math.round(t);
}

function renderSidebar() {
    const sb = document.getElementById('sidebar');
    const a = id => view === id ? 'active' : '';
    const groups = {
        building: P.filter(p => p.status === 'building'),
        live: P.filter(p => p.status === 'live'),
        complete: P.filter(p => p.status === 'complete'),
        reference: P.filter(p => p.status === 'reference'),
    };
    const items = (arr) => arr.map(p => `
        <div class="sidebar-item ${a(p.id)}" onclick="showProject('${p.id}')">
            <span class="sidebar-icon">${p.icon}</span>
            <span class="sidebar-name">${esc(p.name)}</span>
            <span class="${dotCls(p.status)}"></span>
        </div>
    `).join('');

    sb.innerHTML = `
        <div class="sidebar-section">
            <div class="sidebar-label">Views</div>
            <div class="sidebar-item ${a('dashboard')}" onclick="showDash()">
                <span class="sidebar-icon">📋</span><span class="sidebar-name">Dashboard</span>
            </div>
            <div class="sidebar-item ${a('subs')}" onclick="showSubs()">
                <span class="sidebar-icon">💳</span><span class="sidebar-name">Subscriptions</span>
                <span class="sidebar-badge">$${moTotal()}</span>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Building (${groups.building.length})</div>
            ${items(groups.building)}
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Live (${groups.live.length})</div>
            ${items(groups.live)}
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Complete (${groups.complete.length})</div>
            ${items(groups.complete)}
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Reference (${groups.reference.length})</div>
            ${items(groups.reference)}
        </div>
    `;
}

function stats() {
    document.getElementById('st-total').textContent = P.length;
    document.getElementById('st-deployed').textContent = P.filter(p => p.deployed).length;
    document.getElementById('st-cost').textContent = '$' + moTotal();
}

// ── Dashboard ─────────────────────────────────────────
function showDash() {
    view = 'dashboard'; renderSidebar();
    const m = document.getElementById('main');
    const groups = [
        ['Active Builds', P.filter(p => p.status === 'building')],
        ['Live / Deployed', P.filter(p => p.status === 'live')],
        ['Complete', P.filter(p => p.status === 'complete')],
        ['Reference', P.filter(p => p.status === 'reference')],
    ];
    let h = '';
    for (const [label, arr] of groups) {
        if (!arr.length) continue;
        h += `<div class="section-label">${label} (${arr.length})</div><div class="dash-grid">`;
        h += arr.map(p => `
            <div class="dash-card" onclick="showProject('${p.id}')">
                <div class="dash-card-head">
                    <span class="dash-card-icon">${p.icon}</span>
                    <span class="${pillCls(p.status)}">${p.label}</span>
                </div>
                <h3>${esc(p.name)}</h3>
                <p>${esc(p.desc)}</p>
                <div class="dash-card-tech">${p.tech.slice(0,4).map(t=>`<span class="tech-pill">${esc(t)}</span>`).join('')}</div>
            </div>
        `).join('');
        h += '</div>';
    }
    m.innerHTML = h;
}

// ── Project Detail ────────────────────────────────────
function showProject(id) {
    const p = P.find(x => x.id === id);
    if (!p) return;
    view = id; renderSidebar();
    const subs = SUBS.filter(s => s.project === p.name);
    const m = document.getElementById('main');

    m.innerHTML = `
        <div class="detail-head">
            <div>
                <div class="detail-title">
                    <span class="icon">${p.icon}</span>
                    <h2>${esc(p.name)}</h2>
                    <span class="${pillCls(p.status)}">${p.label}</span>
                </div>
                <div class="detail-sub">${esc(p.desc)}</div>
            </div>
            <div class="detail-btns">
                ${p.local ? `<a href="vscode://file/${encodeURI(p.local)}" class="btn btn-primary">Open in VS Code</a>` : ''}
                ${p.repoUrl ? `<a href="${p.repoUrl}" target="_blank" class="btn btn-secondary">GitHub</a>` : ''}
                ${p.liveUrl ? `<a href="${p.liveUrl}" target="_blank" class="btn btn-link">Live →</a>` : ''}
            </div>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <div class="info-box-label">What's Built (${p.built.length} items)</div>
                <ul>${p.built.map(b => `<li>${esc(b)}</li>`).join('')}</ul>
            </div>
            <div class="info-box">
                <div class="info-box-label">Tech Stack</div>
                <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.6rem;">
                    ${p.tech.map(t => `<span class="tech-pill">${esc(t)}</span>`).join('')}
                </div>
                ${p.pricing ? `<div style="font-size:0.82rem;color:var(--cp-text-muted);margin-top:0.5rem;">💰 ${esc(p.pricing)}</div>` : ''}
                ${p.env.length ? `
                    <div class="info-box-label" style="margin-top:0.65rem;">Env Variables</div>
                    <div style="display:flex;flex-wrap:wrap;gap:0.25rem;">
                        ${p.env.map(v => `<span class="env-tag">${esc(v)}</span>`).join('')}
                    </div>
                ` : ''}
            </div>
        </div>

        ${subs.length ? `
            <div class="info-box">
                <div class="info-box-label">Services & Subscriptions</div>
                <table class="sub-tbl">
                    <thead><tr><th>Service</th><th>Cost</th><th>Billing</th><th>Status</th><th>Notes</th></tr></thead>
                    <tbody>${subs.map(s => `
                        <tr>
                            <td style="font-weight:600;">${esc(s.name)}</td>
                            <td>${s.cost === 0 ? 'Free' : (s.cycle==='one-time' ? '$'+s.cost : '$'+s.cost+'/'+(s.cycle==='yearly'?'yr':'mo'))}</td>
                            <td style="color:var(--cp-text-muted);font-size:0.78rem;">${s.cycle}</td>
                            <td><span class="sub-badge sb-${s.status}">${s.status}</span></td>
                            <td style="font-size:0.78rem;color:var(--cp-text-soft);">${esc(s.note)}</td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            </div>
        ` : ''}
    `;
}

// ── Subscriptions ─────────────────────────────────────
function showSubs() {
    view = 'subs'; renderSidebar();
    const m = document.getElementById('main');
    const mo = moTotal();
    const paid = SUBS.filter(s => s.status === 'active' && s.cost > 0);
    const free = SUBS.filter(s => s.status === 'free' || s.cost === 0);

    m.innerHTML = `
        <div class="view-title">Subscriptions & Services</div>
        <div class="view-sub">All paid services, free tiers, and API usage across ${P.length} projects.</div>

        <div class="sub-summary">
            <div class="sub-stat"><div class="label">Monthly</div><div class="val" style="color:var(--cp-accent);">$${mo}</div></div>
            <div class="sub-stat"><div class="label">Yearly Est.</div><div class="val" style="color:var(--cp-warning);">$${mo*12}</div></div>
            <div class="sub-stat"><div class="label">Paid</div><div class="val">${paid.length}</div></div>
            <div class="sub-stat"><div class="label">Free</div><div class="val" style="color:var(--cp-success);">${free.length}</div></div>
        </div>

        <div class="info-box">
            <div class="info-box-label">All Services</div>
            <table class="sub-tbl">
                <thead><tr><th>Service</th><th>Project</th><th>Cost</th><th>Billing</th><th>Status</th><th>Notes</th></tr></thead>
                <tbody>${SUBS.map(s => `
                    <tr>
                        <td style="font-weight:600;">${esc(s.name)}</td>
                        <td><span style="cursor:pointer;color:var(--cp-link);" onclick="showByName('${esc(s.project)}')">${esc(s.project)}</span></td>
                        <td>${s.cost === 0 ? 'Free' : (s.cycle==='one-time' ? '$'+s.cost+' once' : '$'+s.cost+'/'+(s.cycle==='yearly'?'yr':'mo'))}</td>
                        <td style="color:var(--cp-text-muted);font-size:0.78rem;">${s.cycle}</td>
                        <td><span class="sub-badge sb-${s.status}">${s.status}</span></td>
                        <td style="font-size:0.78rem;color:var(--cp-text-soft);">${esc(s.note)}</td>
                    </tr>
                `).join('')}</tbody>
            </table>
        </div>

        <div class="review-box">
            <h4>⚠️ Worth Reviewing</h4>
            <ul>
                <li>• <strong>Render $7/mo</strong> (Tuck API) — Actively using Tuck? Could downgrade to free tier.</li>
                <li>• <strong>Twilio ~$1/mo</strong> (Swoop) — Holding a phone number even without customers.</li>
                <li>• <strong>Namecheap $12/yr</strong> (tuckapp.site) — Check renewal date. Cancel if unused.</li>
                <li>• <strong>OpenAI API</strong> (Swoop) — Usage-based but check for unexpected charges.</li>
                <li>• <strong>Pushover $5</strong> (Lunch Notifier) — Confirm purchase vs expired trial.</li>
            </ul>
        </div>
    `;
}

function showByName(name) {
    const p = P.find(x => x.name === name);
    if (p) showProject(p.id);
}

function toggleTheme() {
    const c = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', c === 'dark' ? 'light' : 'dark');
}

// ── Init ──────────────────────────────────────────────
stats(); showDash();
</script>
</body>
</html>
